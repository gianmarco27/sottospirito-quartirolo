<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sotto Spirito — CMS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      .upload-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-family: system-ui, sans-serif;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .upload-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      .upload-bar-track {
        width: 280px;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.25);
        margin-top: 12px;
        overflow: hidden;
      }
      .upload-bar-fill {
        height: 100%;
        border-radius: 3px;
        background: #fff;
        width: 0%;
        transition: width 0.15s;
      }
      .upload-bar-fill.indeterminate {
        width: 30%;
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
      .upload-label {
        font-size: 14px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="upload-overlay" class="upload-overlay">
      <span class="upload-label" id="upload-label">Caricamento in corso…</span>
      <div class="upload-bar-track">
        <div class="upload-bar-fill" id="upload-bar"></div>
      </div>
    </div>

    <script>
      // Show loading overlay for R2 file uploads (Sveltia CMS → Cloudflare R2 via fetch)
      (function () {
        var overlay = document.getElementById('upload-overlay');
        var bar = document.getElementById('upload-bar');
        var label = document.getElementById('upload-label');
        var pending = 0;

        function show() {
          pending++;
          bar.style.width = '';
          bar.classList.add('indeterminate');
          label.textContent = 'Caricamento in corso…';
          overlay.classList.add('active');
        }

        function hide(success) {
          pending = Math.max(0, pending - 1);
          if (pending > 0) return;
          bar.classList.remove('indeterminate');
          bar.style.width = '100%';
          label.textContent = success ? 'Completato' : 'Errore durante il caricamento';
          setTimeout(function () { overlay.classList.remove('active'); }, success ? 500 : 2000);
        }

        function isR2Url(url) {
          return typeof url === 'string' && url.indexOf('.r2.cloudflarestorage.com') !== -1;
        }

        function isWriteMethod(m) { return /^(PUT|POST|PATCH)$/i.test(m || ''); }

        var origFetch = window.fetch;
        window.fetch = function (input, init) {
          var url, method;

          if (input instanceof Request) {
            url = input.url;
            method = input.method;
          } else {
            url = String(input);
            method = (init && init.method) || 'GET';
          }

          if (isR2Url(url) && isWriteMethod(method)) {
            show();
            return origFetch.apply(this, arguments).then(
              function (r) { hide(r.ok); return r; },
              function (e) { hide(false); throw e; }
            );
          }

          return origFetch.apply(this, arguments);
        };
      })();
    </script>

    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>
  </body>
</html>
