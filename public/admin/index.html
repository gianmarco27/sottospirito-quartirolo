<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sotto Spirito — CMS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      .upload-overlay {
        position: fixed;
        inset: 0;
        border: none;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        padding: 0;
        margin: 0;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .upload-overlay::backdrop {
        background: transparent;
      }
      .upload-bar-track {
        width: 280px;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.25);
        margin-top: 12px;
        overflow: hidden;
      }
      .upload-bar-fill {
        height: 100%;
        border-radius: 3px;
        background: #fff;
        width: 0%;
        transition: width 0.15s;
      }
      .upload-bar-fill.indeterminate {
        width: 40%;
        animation: slide 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes slide {
        0%   { transform: translateX(-110%); }
        50%  { transform: translateX(175%); }
        100% { transform: translateX(-110%); }
      }
      .upload-label {
        font-size: 14px;
        font-weight: 500;
      }
      .upload-cancel {
        margin-top: 16px;
        padding: 6px 20px;
        border: 1.5px solid rgba(255, 255, 255, 0.6);
        border-radius: 6px;
        background: transparent;
        color: #fff;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .upload-cancel:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: #fff;
      }
    </style>
  </head>
  <body>
    <dialog id="upload-overlay" class="upload-overlay">
      <span class="upload-label" id="upload-label">Caricamento in corso…</span>
      <div class="upload-bar-track">
        <div class="upload-bar-fill" id="upload-bar"></div>
      </div>
      <button type="button" class="upload-cancel" id="upload-cancel">Annulla</button>
    </dialog>

    <script>
      // Show loading overlay for R2 file uploads (Sveltia CMS → Cloudflare R2 via fetch)
      (function () {
        var overlay = document.getElementById('upload-overlay');
        var bar = document.getElementById('upload-bar');
        var label = document.getElementById('upload-label');
        var cancelBtn = document.getElementById('upload-cancel');
        var pending = 0;
        var controllers = [];

        function show() {
          pending++;
          bar.style.width = '';
          bar.classList.add('indeterminate');
          label.textContent = 'Caricamento in corso…';
          cancelBtn.style.display = '';
          if (!overlay.open) overlay.showModal();
        }

        function hide(success) {
          pending = Math.max(0, pending - 1);
          if (pending > 0) return;
          controllers = [];
          bar.classList.remove('indeterminate');
          bar.style.width = '100%';
          label.textContent = success ? 'Completato' : 'Errore durante il caricamento';
          cancelBtn.style.display = 'none';
          setTimeout(function () { if (overlay.open) overlay.close(); }, success ? 500 : 2000);
        }

        function forceClose() {
          controllers.forEach(function (c) { c.abort(); });
          controllers = [];
          pending = 0;
          bar.classList.remove('indeterminate');
          if (overlay.open) overlay.close();
        }

        cancelBtn.addEventListener('click', function () {
          controllers.forEach(function (c) { c.abort(); });
          controllers = [];
          pending = 0;
          bar.classList.remove('indeterminate');
          bar.style.width = '0%';
          label.textContent = 'Caricamento annullato';
          cancelBtn.style.display = 'none';
          setTimeout(function () { if (overlay.open) overlay.close(); }, 1200);
        });

        function isR2Url(url) {
          return typeof url === 'string' && url.indexOf('.r2.cloudflarestorage.com') !== -1;
        }

        function isWriteMethod(m) { return /^(PUT|POST|PATCH)$/i.test(m || ''); }

        var origFetch = window.fetch;
        window.fetch = function (input, init) {
          var url, method;

          if (input instanceof Request) {
            url = input.url;
            method = input.method;
          } else {
            url = String(input);
            method = (init && init.method) || 'GET';
          }

          if (isR2Url(url) && isWriteMethod(method)) {
            var ac = new AbortController();
            controllers.push(ac);

            // Merge abort signal into init
            var opts = Object.assign({}, init || {});
            opts.signal = ac.signal;
            var args = input instanceof Request ? [input, opts] : [input, opts];

            show();
            return origFetch.apply(this, args).then(
              function (r) { hide(r.ok); return r; },
              function (e) {
                if (e && e.name === 'AbortError') { return new Response(null, { status: 0 }); }
                hide(false); throw e;
              }
            );
          }

          return origFetch.apply(this, arguments);
        };
      })();
    </script>

    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>
  </body>
</html>
